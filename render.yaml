services:
  - type: web
    name: carrera-caballos-multijugador
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: SQLITE_PATH
        value: /var/data/data.sqlite
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
