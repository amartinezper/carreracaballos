<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Carrera de Caballos - Baraja Española</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="container">
  <h1>🐎 Carrera de Caballos</h1>
  <p class="muted">Baraja Española — tablero alineado por cartas + mazo</p>
</header>

<main class="container grid">

  <section class="card">
    <h2>Configuración</h2>

    <div class="row">
      <span>Jugadores</span>
      <select id="playersSelect">
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4" selected>4</option>
      </select>
    </div>

    <div class="row gap">
      <button id="btnStart">Iniciar</button>
      <button id="btnReset" class="secondary">Reiniciar</button>
    </div>

    <hr/>

    <h2>Acciones</h2>
    <div class="row gap">
      <button id="btnDraw" disabled>Robar carta</button>
      <button id="btnAuto" disabled class="secondary">Auto</button>
      <button id="btnStop" disabled class="secondary">Detener</button>
    </div>

    <div class="status">
      <div><strong>Última carta:</strong> <span id="lastCard">—</span></div>
      <div><strong>Ganador:</strong> <span id="winner">—</span></div>
    </div>
  </section>

  <section class="card">
    <h2>Tablero</h2>

    <div class="boardLayout">
      <div id="board" class="board"></div>

      <aside class="sideArea">
        <h2>Mazo</h2>
        <div class="deckStack">
          <div class="cardBack big"></div>
          <div class="deckInfo">
            <div><strong>Restantes:</strong> <span id="remaining2">—</span></div>
          </div>
        </div>

        <h2>Última carta</h2>
        <div id="lastCardFace" class="cardFace big">—</div>
      </aside>
    </div>
  </section>

  <section class="card">
    <h2>Registro</h2>
    <div id="log" class="log">— Inicia un juego —</div>
  </section>

</main>

<script src="app.js"></script>
</body>
</html>
